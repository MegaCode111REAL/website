<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Loader Sandbox</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: #0a0a0a;
    color: #00ff88;
}

#info {
    padding: 20px;
    line-height: 1.6;
}

iframe {
    width: 100%;
    height: 60vh;
    border: none;
    background: white;
}

#console {
    height: 40vh;
    overflow-y: auto;
    background: black;
    padding: 10px;
    border-top: 2px solid #00ff88;
}

.log { color: #00ff88; }
.error { color: #ff4444; }
.warn { color: #ffaa00; }

input[type="file"] {
    margin-top: 10px;
    background: black;
    color: #00ff88;
    border: 1px solid #00ff88;
    padding: 5px;
}
</style>
</head>
<body>

<div id="info" style="display:none;"></div>
<iframe id="htmlFrame" style="display:none;"></iframe>
<div id="console" style="display:none;"></div>

<script>
const params = new URLSearchParams(location.search);
const htmlParam = params.get("html");
const jsParam = params.get("js");

const info = document.getElementById("info");
const iframe = document.getElementById("htmlFrame");
const consoleDiv = document.getElementById("console");

// ===== INFO PAGE =====
if (!htmlParam && !jsParam) {
    info.style.display = "block";
    info.innerHTML = `
<h1>URL Loader Sandbox</h1>

<p>Load HTML and JavaScript via URL parameters or upload files.</p>

<h2>Usage:</h2>

<b>HTML:</b><br>
?html=&lt;h1&gt;Hello&lt;/h1&gt;<br>
or<br>
?html=https://example.com/page.html

<br><br>

<b>JavaScript:</b><br>
?js=console.log("hello")<br>
or<br>
?js=https://example.com/script.js

<br><br>

<b>Combined:</b><br>
?html=...&js=...

<h2>Upload HTML file:</h2>
<input type="file" id="fileInput" accept=".html">
<p>Select a .html file to load it instantly.</p>
`;

    document.getElementById("fileInput").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            info.style.display = "none";
            iframe.style.display = "block";
            iframe.srcdoc = event.target.result;
        };
        reader.readAsText(file);
    });

    throw "No params";
}

// ===== HTML LOADER =====
async function loadHTML() {
    if (!htmlParam) return;

    iframe.style.display = "block";

    try {
        if (htmlParam.startsWith("http://") || htmlParam.startsWith("https://")) {
            const res = await fetch(htmlParam);
            const text = await res.text();
            iframe.srcdoc = text;
        } else {
            iframe.srcdoc = decodeURIComponent(htmlParam);
        }
    } catch (e) {
        iframe.srcdoc = "<h1 style='color:red;'>Failed to load HTML</h1>";
    }
}

// ===== CONSOLE CAPTURE =====
function logToPage(type, args) {
    consoleDiv.style.display = "block";

    const div = document.createElement("div");
    div.className = type;

    div.textContent = args.map(a => {
        if (typeof a === "object") {
            try { return JSON.stringify(a); }
            catch { return "[object]"; }
        }
        return String(a);
    }).join(" ");

    consoleDiv.appendChild(div);
    consoleDiv.scrollTop = consoleDiv.scrollHeight;
}

// Override console
["log", "error", "warn"].forEach(type => {
    const original = console[type];
    console[type] = (...args) => {
        logToPage(type, args);
        original.apply(console, args);
    };
});

// ===== JS RUNNER =====
async function runJS() {
    if (!jsParam) return;

    try {
        let code;

        if (jsParam.startsWith("http://") || jsParam.startsWith("https://")) {
            const res = await fetch(jsParam);
            code = await res.text();
        } else {
            code = decodeURIComponent(jsParam);
        }

        // Run WITHOUT replacing page
        new Function(code)();

    } catch (e) {
        console.error("JS Error:", e);
    }
}

// ===== INIT =====
(async () => {
    await loadHTML();   // load HTML first
    await runJS();      // then run JS
})();
</script>

</body>
</html>
