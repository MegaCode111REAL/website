<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Music Player</title>

<script src="https://cdn.jsdelivr.net/npm/music-metadata-browser/dist/music-metadata-browser.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #121212;
    color: white;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: #181818;
    height: 100vh;
    overflow-y: auto;
}

.song {
    display: flex;
    align-items: center;
    padding: 10px;
    cursor: pointer;
}

.song:hover {
    background: #282828;
}

.song img {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    margin-right: 10px;
}

/* Player */
.player {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.player img {
    width: 180px;
    height: 180px;
    border-radius: 12px;
}

/* Controls */
.controls button {
    margin: 10px;
    padding: 12px;
    border-radius: 50%;
    border: none;
    background: #1db954;
    color: white;
    font-size: 16px;
}

/* Progress */
.progress-container {
    width: 60%;
    height: 6px;
    background: #333;
    cursor: pointer;
    margin-top: 10px;
}

.progress {
    height: 100%;
    width: 0%;
    background: #1db954;
}

/* Volume */
.volume {
    margin-top: 15px;
}

/* Visualizer */
canvas {
    margin-top: 20px;
    width: 60%;
    height: 80px;
    background: #111;
}
</style>
</head>

<body>

<div class="sidebar" id="songList"></div>

<div class="player">
    <img id="cover">
    <h2 id="title">Loading...</h2>

    <div class="controls">
        <button onclick="prev()">⏮</button>
        <button onclick="playPause()" id="playBtn">▶</button>
        <button onclick="next()">⏭</button>
    </div>

    <div class="progress-container" onclick="seek(event)">
        <div class="progress" id="progress"></div>
    </div>

    <input type="range" class="volume" min="0" max="1" step="0.01" onchange="setVolume(this.value)">

    <canvas id="visualizer"></canvas>
</div>

<audio id="audio"></audio>

<script>
const audio = document.getElementById("audio");
const title = document.getElementById("title");
const cover = document.getElementById("cover");
const list = document.getElementById("songList");
const progress = document.getElementById("progress");
const playBtn = document.getElementById("playBtn");

let songs = [];
let current = 0;

/* ===== LOAD SONGS ===== */
fetch("songs.json")
.then(res => res.json())
.then(async files => {
    for (let file of files) {
        const res = await fetch(file);
        const buffer = await res.arrayBuffer();
        const metadata = await musicMetadata.parseBlob(new Blob([buffer]));

        let song = {
            file,
            name: metadata.common.title || file.split("/").pop(),
            cover: ""
        };

        if (metadata.common.picture?.length) {
            const pic = metadata.common.picture[0];
            song.cover = URL.createObjectURL(
                new Blob([pic.data], { type: pic.format })
            );
        } else {
            song.cover = "https://via.placeholder.com/150";
        }

        songs.push(song);
    }

    renderList();

    // Restore last session
    const saved = JSON.parse(localStorage.getItem("playerState"));
    if (saved) {
        current = saved.index;
        loadSong(current);
        audio.currentTime = saved.time;
    } else {
        loadSong(0);
    }
});

/* ===== RENDER SIDEBAR ===== */
function renderList() {
    list.innerHTML = "";
    songs.forEach((s, i) => {
        const div = document.createElement("div");
        div.className = "song";
        div.innerHTML = `<img src="${s.cover}"><span>${s.name}</span>`;
        div.onclick = () => {
            loadSong(i);
            audio.play();
        };
        list.appendChild(div);
    });
}

/* ===== LOAD SONG ===== */
function loadSong(i) {
    current = i;
    const s = songs[i];
    audio.src = s.file;
    title.textContent = s.name;
    cover.src = s.cover;
}

/* ===== CONTROLS ===== */
function playPause() {
    if (audio.paused) {
        audio.play();
        playBtn.textContent = "⏸";
    } else {
        audio.pause();
        playBtn.textContent = "▶";
    }
}

function next() {
    loadSong((current + 1) % songs.length);
    audio.play();
}

function prev() {
    loadSong((current - 1 + songs.length) % songs.length);
    audio.play();
}

/* ===== PROGRESS ===== */
audio.addEventListener("timeupdate", () => {
    progress.style.width =
        (audio.currentTime / audio.duration) * 100 + "%";

    // Save progress
    localStorage.setItem("playerState", JSON.stringify({
        index: current,
        time: audio.currentTime
    }));
});

function seek(e) {
    const w = e.currentTarget.clientWidth;
    audio.currentTime = (e.offsetX / w) * audio.duration;
}

/* ===== VOLUME ===== */
function setVolume(v) {
    audio.volume = v;
}

/* ===== AUTO NEXT ===== */
audio.addEventListener("ended", next);

/* ===== VISUALIZER ===== */
const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const analyser = audioCtx.createAnalyser();
const source = audioCtx.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize = 64;
const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);

function draw() {
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const barWidth = canvas.width / bufferLength;

    for (let i = 0; i < bufferLength; i++) {
        const height = dataArray[i];
        ctx.fillStyle = "#1db954";
        ctx.fillRect(i * barWidth, canvas.height - height, barWidth - 2, height);
    }
}

draw();
</script>

</body>
</html>
