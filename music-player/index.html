<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Music Player</title>
<style>
body {
    background: #121212;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Player Container */
.player {
    width: 350px;
    background: #181818;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* Song Info */
.song-info {
    text-align: center;
}

.song-info img {
    width: 120px;
    height: 120px;
    border-radius: 12px;
    margin-bottom: 10px;
}

/* Controls */
.controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 15px 0;
}

button {
    background: #1db954;
    border: none;
    color: white;
    padding: 10px 14px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #1ed760;
}

/* Progress Bar */
.progress-container {
    width: 100%;
    height: 6px;
    background: #333;
    border-radius: 3px;
    cursor: pointer;
}

.progress {
    height: 100%;
    width: 0%;
    background: #1db954;
    border-radius: 3px;
}
</style>
</head>
<body>

<div class="player">
    <div class="song-info">
        <img id="icon" src="">
        <h3 id="title">Song Name</h3>
    </div>

    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button onclick="togglePlay()" id="playBtn">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>

    <div class="progress-container" onclick="seek(event)">
        <div class="progress" id="progress"></div>
    </div>
</div>

<audio id="audio"></audio>

<script>
// ===== YOUR SONG LIST =====
// Replace with your files
const songs = [
    {
        name: "Song One",
        file: "songs/song1.mp3",
        icon: "icons/icon1.png"
    },
    {
        name: "Song Two",
        file: "songs/song2.mp3",
        icon: "icons/icon2.png"
    },
    {
        name: "Song Three",
        file: "songs/song3.mp3",
        icon: "icons/icon3.png"
    }
];

let currentSong = 0;
const audio = document.getElementById("audio");
const title = document.getElementById("title");
const icon = document.getElementById("icon");
const playBtn = document.getElementById("playBtn");
const progress = document.getElementById("progress");

// Load song
function loadSong(index) {
    const song = songs[index];
    audio.src = song.file;
    title.textContent = song.name;
    icon.src = song.icon;
}

// Play / Pause
function togglePlay() {
    if (audio.paused) {
        audio.play();
        playBtn.textContent = "⏸";
    } else {
        audio.pause();
        playBtn.textContent = "▶";
    }
}

// Next / Prev
function nextSong() {
    currentSong = (currentSong + 1) % songs.length;
    loadSong(currentSong);
    audio.play();
    playBtn.textContent = "⏸";
}

function prevSong() {
    currentSong = (currentSong - 1 + songs.length) % songs.length;
    loadSong(currentSong);
    audio.play();
    playBtn.textContent = "⏸";
}

// Progress update
audio.addEventListener("timeupdate", () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    progress.style.width = percent + "%";
});

// Seek
function seek(e) {
    const width = e.currentTarget.clientWidth;
    const clickX = e.offsetX;
    const duration = audio.duration;
    audio.currentTime = (clickX / width) * duration;
}

// Auto next
audio.addEventListener("ended", nextSong);

// Init
loadSong(currentSong);
</script>

</body>
</html>
