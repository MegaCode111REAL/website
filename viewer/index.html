<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote URL Injector</title>
</head>
<body>
    <div id="content"></div>
    <script>
        async function loadRemoteURL(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const html = await response.text();

                // Create a base URL for relative paths
                const baseUrl = new URL(url).origin + '/';
                const baseElement = document.createElement('base');
                baseElement.href = baseUrl;
                document.head.appendChild(baseElement);

                // Inject the HTML
                document.getElementById('content').innerHTML = html;

                // Find and execute scripts
                const scriptMatches = html.match(/<script[^>]*>([\s\S]*?)<\/script>/g) || [];
                scriptMatches.forEach(scriptTag => {
                    const blob = new Blob([scriptTag], { type: 'application/javascript' });
                    const scriptElement = document.createElement('script');
                    scriptElement.src = URL.createObjectURL(blob);
                    scriptElement.onload = () => URL.revokeObjectURL(scriptElement.src);
                    document.body.appendChild(scriptElement);
                });
            } catch (error) {
                console.error('Error loading remote URL:', error);
            }
        }

        // Example usage
        loadRemoteURL('https://example.com'); // Replace with your desired remote URL
    </script>
</body>
</html>
