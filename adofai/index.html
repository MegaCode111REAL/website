<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>A Dance of Fire And Ice</title>

    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script src="Build/UnityLoader.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f0f10;
        }

        #gameContainer {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* ONLY visual scaling (no JS resizing hacks) */
        #gameContainer canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
    </style>
</head>

<body>
    <div id="gameContainer"></div>

    <script>
        var gameInstance = UnityLoader.instantiate(
            "gameContainer",
            "Build/adofaiii4.json",
            {
                onProgress: function (instance, progress) {
                    // 🔊 Fix iOS Safari audio unlock
                    if (progress === 1) {
                        const unlockAudio = () => {
                            if (instance && instance.Module && instance.Module.SDL && instance.Module.SDL.audioContext) {
                                const ctx = instance.Module.SDL.audioContext;
                                if (ctx.state === "suspended") {
                                    ctx.resume();
                                }
                            }
                            document.removeEventListener("touchstart", unlockAudio);
                            document.removeEventListener("click", unlockAudio);
                        };

                        document.addEventListener("touchstart", unlockAudio);
                        document.addEventListener("click", unlockAudio);
                    }
                }
            }
        );
    </script>
</body>
</html>
