<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>A Dance of Fire And Ice</title>

    <script src="Build/UnityLoader.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 🚫 no scrolling */
            background: #0f0f10;
            font-family: sans-serif;
        }

        /* Center everything */
        #wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* Game container */
        #gameContainer {
            width: 95vw;
            height: 95vh;
            max-width: 1600px;
            max-height: 900px;
            aspect-ratio: 16 / 9;

            background: black;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border-radius: 12px;
            overflow: hidden;
        }

        /* Optional: slight glow effect */
        #gameContainer::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>
    <div id="wrapper">
        <div id="gameContainer"></div>
    </div>

    <script>
        var gameInstance = UnityLoader.instantiate(
            "gameContainer",
            "Build/adofaiii4.json"
        );
    </script>
</body>
</html>
