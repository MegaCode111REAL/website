<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>A Dance of Fire And Ice</title>

    <script src="Build/UnityLoader.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f0f10;
        }

        #wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        #gameContainer {
            width: 95vw;
            height: 95vh;
            max-width: 1600px;
            max-height: 900px;
            aspect-ratio: 16 / 9;

            background: black;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        /* 🔥 FORCE UNITY CANVAS TO FILL */
        #gameContainer canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
    </style>
</head>

<body>
    <div id="wrapper">
        <div id="gameContainer"></div>
    </div>

    <script>
        var gameInstance = UnityLoader.instantiate(
            "gameContainer",
            "Build/adofaiii4.json",
            {
                onProgress: function (instance, progress) {
                    // Force resize after load
                    if (progress === 1) {
                        setTimeout(() => {
                            window.dispatchEvent(new Event('resize'));
                        }, 200);
                    }
                }
            }
        );
    </script>
</body>
</html>
