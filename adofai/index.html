<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>A Dance of Fire And Ice</title>

    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no">

    <script src="Build/UnityLoader.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f0f10;
        }

        #wrapper {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
        }

        /* Unity canvas must fully fill */
        #gameContainer canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
    </style>
</head>

<body>
    <div id="wrapper">
        <div id="gameContainer"></div>
    </div>

    <script>
        var gameInstance = UnityLoader.instantiate(
            "gameContainer",
            "Build/adofaiii4.json",
            {
                Module: {
                    // 🔥 CRITICAL: prevents internal scaling bugs
                    matchWebGLToCanvasSize: true,
                    devicePixelRatio: 1
                }
            }
        );
    </script>
</body>
</html>
